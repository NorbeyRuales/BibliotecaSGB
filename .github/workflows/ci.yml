name: CI - Validacion del proyecto

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validar build React/Vite
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar build
        run: npm run build
